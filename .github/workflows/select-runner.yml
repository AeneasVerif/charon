# Check if the "heartbeat" job completed recently. If so, use the self-hosted
# runner; otherwise use the github-hosted one.
name: "Select runner"

on:
  workflow_call:
    outputs:
      runs_on:
        value: ${{ jobs.select.outputs.runs_on }}

jobs:
  select:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      runs_on: ${{ steps.select.outputs.runs_on }}
    steps:
      - id: select
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          self_hosted='["self-hosted","linux","nix"]'
          github_hosted='["ubuntu-latest"]'
          max_age_seconds=$((3 * 60 * 60))

          query_error="$(mktemp)"
          if default_branch=$(gh api "repos/${GITHUB_REPOSITORY}" --jq .default_branch 2>"$query_error"); then
            :
          else
            message="$(tr '\n' ' ' < "$query_error")"
            echo "::warning title=Could not query default branch::Falling back to GitHub-hosted runner. gh api: $message"
            echo "runs_on=$github_hosted" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          : > "$query_error"
          if completed_at=$(gh api \
              "repos/${GITHUB_REPOSITORY}/actions/workflows/runner-heartbeat.yml/runs?branch=${default_branch}&status=success&per_page=1" \
              --jq '.workflow_runs[0].updated_at // ""' \
              2>"$query_error"); then
            :
          else
            message="$(tr '\n' ' ' < "$query_error")"
            echo "::warning title=Could not query runner heartbeat::Falling back to GitHub-hosted runner. gh api: $message"
            echo "runs_on=$github_hosted" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$completed_at" ]; then
            echo "::notice title=No runner heartbeat::Falling back to GitHub-hosted runner; no successful runner-heartbeat run was found on ${default_branch}."
            echo "runs_on=$github_hosted" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          now="$(date -u +%s)"
          heartbeat="$(date -u -d "$completed_at" +%s)"
          age="$((now - heartbeat))"

          if [ "$age" -le "$max_age_seconds" ]; then
            echo "Recent runner heartbeat found at $completed_at; selecting self-hosted runner labels."
            echo "runs_on=$self_hosted" >> "$GITHUB_OUTPUT"
          else
            echo "::notice title=Stale runner heartbeat::Falling back to GitHub-hosted runner; latest runner heartbeat was at $completed_at."
            echo "runs_on=$github_hosted" >> "$GITHUB_OUTPUT"
          fi
