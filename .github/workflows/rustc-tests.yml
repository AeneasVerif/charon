on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

env:
  HAS_CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN != '' }}

jobs:
  select-runner:
    uses: ./.github/workflows/select-runner.yml

  rustc-tests:
    needs: [select-runner]
    runs-on: ${{ fromJSON(needs.select-runner.outputs.runs_on) }}
    steps:
      - name: Install Nix
        if: ${{ runner.environment == 'github-hosted' }}
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            extra-substituters = https://hacl.cachix.org
            extra-trusted-public-keys = hacl.cachix.org-1:FzsZ2xsByOwKwIWNPII7yMOelJNDZ12mDAj3d1eGX0c=
      - name: Set up Cachix push
        if: ${{ env.HAS_CACHIX_AUTH_TOKEN == 'true' }}
        uses: cachix/cachix-action@v17
        with:
          name: hacl
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipAddingSubstituter: true
      - uses: actions/checkout@v4
      - run: |
          nix build -L '.#rustc-tests'
          echo "Summary of the results:" > message.txt
          echo '```text' >> message.txt
          cat result/charon-summary >> message.txt
          echo '```' >> message.txt
          cat result/charon-grouped-results >> message.txt
      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const message = fs.readFileSync('./message.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: 145,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message,
            });
