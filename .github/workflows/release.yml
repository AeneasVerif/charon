name: Release
on:
  schedule:
    - cron: '0 4 * * *' # Nightly at 04:00 UTC
  workflow_dispatch:

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag_name: ${{ steps.tag.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4
      - name: Generate Tag
        id: tag
        run: |
          set -eo pipefail

          TAG_NAME="nightly-$(date +'%Y.%m.%d')"
          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          prerelease: true
          make_latest: false
          generate_release_notes: true

  build:
    name: Build (${{ matrix.artifact_name }})
    needs: prepare
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
      actions: write
    strategy:
      fail-fast: false
      matrix:
        # NOTE: We use native runners instead of cross-compiling to work around
        # https://github.com/rust-lang/rust/issues/132728#issuecomment-2462937687
        include:
          - os: [self-hosted, linux, nix]
            artifact_name: charon-linux-x86_64
            nix_machine: true
          - os: ubuntu-24.04-arm
            artifact_name: charon-linux-aarch64
            nix_machine: false
          - os: macos-15-intel
            artifact_name: charon-macos-x86_64
            nix_machine: false
          - os: macos-latest
            artifact_name: charon-macos-aarch64
            nix_machine: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        if: ${{ ! matrix.nix_machine }}
        uses: cachix/install-nix-action@v31

      - name: Set up Cachix push
        if: ${{ ! matrix.nix_machine }}
        uses: cachix/cachix-action@v17
        with:
          name: hacl
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Restore Nix Cache
        if: ${{ ! matrix.nix_machine }}
        id: restore-nix-cache
        uses: nix-community/cache-nix-action/restore@v6
        with:
          primary-key: ${{ matrix.artifact_name }}-release-${{ hashFiles('**/flake.lock') }}
          # if there's no cache hit, restore a cache by this prefix
          restore-prefixes-first-match: ${{ matrix.artifact_name }}-release

      - name: Package
        run: |
          set -eo pipefail

          nix build -L .#charon-release
          mkdir dist_staging
          cp -R result/. dist_staging/
          chmod -R +w dist_staging

          cd dist_staging
          # Remove existing archive to avoid overwrite failures on macOS.
          rm -f "../${{ matrix.artifact_name }}.tar.gz"
          tar -czf "../${{ matrix.artifact_name }}.tar.gz" -- *

      # Verify the binary is functional and still links to `rustc_driver.so` on Linux.
      - name: Smoke Test
        run: |
          set -eo pipefail

          mkdir staging
          cd staging
          tar xf ../${{ matrix.artifact_name }}.tar.gz
          ./charon --help > /dev/null
          if [ "${{ matrix.artifact_name }}" = "charon-linux-x86_64" ]; then
            ldd ./charon-driver 2>&1 | grep rustc_driver
          fi

      - name: Upload Artifact
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          files: ${{ matrix.artifact_name }}.tar.gz

      - name: Save Nix Cache
        if: ${{ always() && ! matrix.nix_machine }}
        uses: nix-community/cache-nix-action/save@v6
        with:
          primary-key: ${{ steps.restore-nix-cache.outputs.primary-key }}
          gc-max-store-size: 2G
          purge: true
          purge-created: 604800 # 7 * 24 * 3600 = 7 days in seconds

  notify:
    name: Notify Zulip
    needs: [prepare, build]
    runs-on: ubuntu-latest
    if: ${{ success() || failure() }}
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Generate Zulip Message
        env:
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
          PREPARE_RESULT: ${{ needs.prepare.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 ./scripts/ci-release-message.py | tee "$GITHUB_ENV"

      - name: Send Zulip Release Summary
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            { "text": ${{ toJSON(env.MSG) }} }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.ZULIP_WEBHOOK_URL }}

      - name: Send Zulip Error Message
        if: ${{ failure() }}
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            { "text": "Unexpected Error: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.ZULIP_WEBHOOK_URL }}
